# ════════════════════════════════════════════════════════════════
#  Netlify-Konfiguration · FinCoach AI M310 · Frankenschnellweg
#  Statische Site — kein Build-Step nötig (reines HTML/CSS/JS via CDN)
# ════════════════════════════════════════════════════════════════

[build]
  publish = "."
  command = ""

# Saubere URLs
[[redirects]]
  from = "/impressum"
  to = "/impressum.html"
  status = 200
[[redirects]]
  from = "/datenschutz"
  to = "/datenschutz.html"
  status = 200
[[redirects]]
  from = "/analyse"
  to = "/modul.html"
  status = 200
[[redirects]]
  from = "/modul"
  to = "/modul.html"
  status = 200

# 404 -> Startseite
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# ───────────── Sicherheits-Header ─────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # CSP: erlaubt CDNs (Tailwind, jsDelivr/KaTeX/Chart.js/ECharts, unpkg/Leaflet),
    # Wikimedia-Bilder, OSM-Tiles, YouTube-nocookie-Embed, Nominatim-API.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https://upload.wikimedia.org https://*.tile.openstreetmap.org; frame-src https://www.youtube-nocookie.com https://www.openstreetmap.org; connect-src 'self' https://nominatim.openstreetmap.org"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
